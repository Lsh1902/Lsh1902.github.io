<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lsh1902の主页</title>
  <!-- 网页图标 -->
  <link rel="icon" href="https://img.cdn1.vip/i/69c38360c02af_1774420832.webp" type="image/x-icon">
  <link rel="shortcut icon" href="https://img.cdn1.vip/i/69c38360c02af_1774420832.webp" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* 保留背景轮播样式（核心） */
    .bg-slider {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }
    .bg-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }
    .bg-slide.active {
      opacity: 1;
    }

    /* 1. 关闭body径向渐变叠加层（注释掉） */
    /* body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,182,193,0.3) 0%, transparent 5%),
        radial-gradient(circle at 80% 70%, rgba(173,216,230,0.3) 0%, transparent 5%);
      background-size: 100% 100%;
      pointer-events: none;
      z-index: -1;
    } */

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    .card {
      /* 简化卡片样式，移除半透明和模糊（可选保留模糊，删除则注释backdrop-filter） */
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px); /* 可选：降低模糊度，关闭则删除 */
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: none; /* 关闭卡片阴影 */
      border: 1px solid #eee; /* 简化边框 */
      text-align: center;
      position: relative;
    }

    /* 2. 关闭卡片渐变发光效果（注释掉） */
    /* .card::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      border-radius: 24px;
      background: linear-gradient(45deg, #ff9ed8, #a78cff, #87d3ff, #ff9ed8);
      z-index: -1;
      opacity: 0.6;
      animation: glow 4s linear infinite;
    }

    @keyframes glow {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    } */

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      box-shadow: none; /* 关闭头像阴影 */
      margin-bottom: 20px;
    }

    .name {
      font-size: 26px;
      color: #7f6fcf;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .sign {
      font-size: 15px;
      color: #999;
      margin-bottom: 24px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .tag {
      padding: 6px 12px;
      background: #f5f5f5; /* 简化标签背景为纯色 */
      color: #7f6fcf;
      border-radius: 20px;
      font-size: 13px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .btn {
      display: block;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      font-size: 15px;
      border: none;
      cursor: pointer;
    }

    /* 3. 按钮改为纯色背景（关闭渐变） */
    .btn-bilibili {
      background: #fb7299; /* 取渐变主色，关闭linear-gradient */
      color: #fff;
    }

    .btn-love {
      background: #7f6fcf; /* 取渐变主色，关闭linear-gradient */
      color: #fff;
    }

    .btn-github {
      background: #333;
      color: #fff;
    }

    .btn:hover {
      transform: none; /* 关闭hover上移效果 */
      box-shadow: none; /* 关闭hover阴影 */
      opacity: 0.9; /* 简化hover效果为透明度变化 */
    }

    /* 二次元音乐播放器样式 - 简化 */
    .music-player {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 16px;
      padding: 16px;
      margin-top: 12px;
      border: 1px solid #eee; /* 简化边框 */
    }

    .music-title {
      font-size: 14px;
      color: #7f6fcf;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .music-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .control-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #a78cff; /* 纯色替换渐变 */
      color: #fff;
      border: none;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn:hover {
      transform: none; /* 关闭缩放 */
      box-shadow: none; /* 关闭阴影 */
      opacity: 0.9; /* 简化hover */
    }

    audio {
      display: none;
    }
  </style>
</head>

<body>
  <!-- 保留背景轮播容器（核心） -->
  <div class="bg-slider">
    <div class="bg-slide" style="background-image: url('https://img.cdn1.vip/i/69c38cd0ab96e_1774423248.webp');"></div>
    <div class="bg-slide" style="background-image: url('https://img.cdn1.vip/i/69c38cd79f45d_1774423255.webp');"></div>
    <div class="bg-slide" style="background-image: url('https://img.cdn1.vip/i/69c38cd604f8e_1774423254.webp');"></div>
    <div class="bg-slide" style="background-image: url('https://img.cdn1.vip/i/69c38cd1ce7cf_1774423249.webp');"></div>
    <div class="bg-slide" style="background-image: url('https://img.cdn1.vip/i/69c38cd82d0d0_1774423256.webp');"></div>
    <div class="bg-slide" style="background-image: url('https://img.cdn1.vip/i/69c38cd5a6629_1774423253.webp');"></div>
  </div>

  <div class="container">
    <div class="card">
      <img class="avatar" src="https://img.cdn1.vip/i/69c380c30640c_1774420163.jpg" alt="avatar" />
      <h1 class="name">Welcome!</h1>
      <p class="sign">二次元爱好者 | 安静看番，认真生活</p>

      <div class="tags">
        <span class="tag">动漫</span>
        <span class="tag">ACG</span>
        <span class="tag">三角洲</span>
        <span class="tag">日常</span>
      </div>

      <div class="links">
        <a href="https://space.bilibili.com/1895587617" target="_blank" class="btn btn-bilibili">B站主页</a>
        <a href="#" class="btn btn-love">我的番单</a>
        <a href="https://github.com/Lsh1902" target="_blank" class="btn btn-github">GitHub</a>
      </div>

      <!-- 音乐播放器 -->
      <div class="music-player">
        <div class="music-title">播放蜜汁BGM</div>
        <div class="music-controls">
          <button class="control-btn" id="playBtn">▶</button>
        </div>
        <audio id="bgm" loop>
          <source src="https://cdn.sakurai.dev.cn/music/daily.mp3" type="audio/mpeg">
        </audio>
      </div>
    </div>
  </div>

  <!-- 保留背景轮播和音乐播放逻辑（核心） -->
  <script>
    // 音乐播放逻辑
    const bgm = document.getElementById('bgm');
    const playBtn = document.getElementById('playBtn');
    let isPlaying = false;

    playBtn.addEventListener('click', () => {
      if(isPlaying){
        bgm.pause();
        playBtn.textContent = '▶';
      } else {
        bgm.play();
        playBtn.textContent = '⏸';
      }
      isPlaying = !isPlaying;
    });

    // 背景轮播逻辑（保留）
    const slides = document.querySelectorAll('.bg-slide');
    let currentSlide = 0;
    const slideInterval = 5000;

    function nextSlide() {
      slides[currentSlide].classList.remove('active');
      currentSlide = (currentSlide + 1) % slides.length;
      slides[currentSlide].classList.add('active');
    }

    setInterval(nextSlide, slideInterval);
    // 初始化显示第一张轮播图
    slides[0].classList.add('active');
  </script>
</body>
</html>
